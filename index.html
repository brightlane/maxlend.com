<!-- HERO -->
<section class="hero">
  <h1>Need Cash <span>Right Now?</span><br>Get Up to <span>$1,500</span> Today</h1>
  <p>Apply in 5 minutes. Instant decision. Funds deposited as soon as today. Bad credit? No problem.</p>

  <div class="amount-selector">
    <h2>How much do you need?</h2>
    <div class="amount-display" id="amtDisplay">$500</div>
    <input type="range" id="loanSlider" min="100" max="1500" step="50" value="500">
    <div class="range-labels">
      <span>$100</span><span>$1,500</span>
    </div>
    <a class="cta-btn" href="#" target="_blank" rel="noopener" id="mainCTA">
      GET MY $500 NOW ›
    </a>
    <p class="micro-trust"><span>✓ No hard credit pull</span> &nbsp;|&nbsp; <span>✓ Instant decision</span> &nbsp;|&nbsp; <span>✓ 100% online</span></p>
  </div>
</section>

<style>
  /* Smooth hero gradient animation */
  .hero {
    background: linear-gradient(135deg, #0f5229 0%, #1a7c3e 50%, #1a2e1a 100%);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
    color: white;
    padding: 2.5rem 1rem 2rem;
    text-align: center;
    transition: all 0.3s ease;
  }
  @keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  /* Slider styling enhancements */
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(to right, var(--green) 50%, #ddd 50%);
    outline: none;
    transition: background 0.3s ease;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,0,0,0.3);
    transition: transform 0.2s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.1);
  }

  .range-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 1rem;
  }

  /* CTA hover effect */
  .cta-btn {
    display: block;
    width: 100%;
    background: var(--gold);
    color: #1a1a1a;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-align: center;
    padding: 1rem;
    border-radius: 10px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 6px 20px rgba(232,160,32,0.35);
  }
  .cta-btn:hover {
    background: var(--gold-light);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(232,160,32,0.45);
  }

  /* Responsive tweaks */
  @media (max-width: 480px) {
    .hero h1 { font-size: clamp(1.8rem, 6vw, 3rem); }
    .cta-btn { font-size: 1.3rem; }
  }
</style>

<script>
  const slider = document.getElementById('loanSlider');
  const display = document.getElementById('amtDisplay');
  const cta = document.getElementById('mainCTA');
  const affLink = 'https://www.linkconnector.com/ta.php?lc=007949096598005765&atid=__Maxlend__Caesaro__';

  slider.addEventListener('input', () => {
    const val = parseInt(slider.value);
    display.textContent = '$' + val.toLocaleString();
    cta.textContent = 'GET MY $' + val.toLocaleString() + ' NOW ›';
    const percent = (val - slider.min) / (slider.max - slider.min) * 100;
    slider.style.background = `linear-gradient(to right, var(--green) ${percent}%, #ddd ${percent}%)`;
    cta.href = affLink;
  });
</script>
