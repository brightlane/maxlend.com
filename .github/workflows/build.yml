name: Run Generator Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run generator (YOUR MAIN STEP)
      - name: Run site generator
        run: node engine/generate.js

      # 5. Run optional post-build checks
      - name: Run validation
        run: node engine/validate.js || true

      - name: Run link check
        run: node engine/link-check.js || true

      - name: Run crawl simulation
        run: node engine/crawl-sim.js || true

      # 6. Upload generated output
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: generated-site
          path: output/
