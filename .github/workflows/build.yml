name: Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run build pipeline
      - name: Run build script
        run: node engine/build.js

      # 5. Upload output (optional but recommended)
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: site-output
          path: output/
